# Zenith-ops — SDD Configuration
# Auto-generated by sdd-init
schema: spec-driven

context: |
  Tech stack: Python 3.12, FastAPI, Pydantic v2, SQLAlchemy async, asyncpg, structlog
  Architecture: src-layout with src/zenith_ops/ as package root; api/v1/, core/, db/, monitoring/, training/
  Testing: pytest 9, pytest-asyncio (asyncio_mode=auto), pytest-cov, pytest-httpx, pytest-cov (fail_under=70)
  Style: ruff (E, W, F, I, UP, B, SIM), line-length 88, double quotes; mypy strict; conventional commits (commitizen)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Scope must be reviewable in under 400 changed lines
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Flag task groups above 400 changed lines for chained PRs
  apply:
    - Follow existing code patterns (src-layout, typed, async)
  tdd: true
  test_command: "uv run pytest tests/ --cov=src --cov-report=term-missing -v"
  verify:
    test_command: "uv run pytest tests/ --cov=src --cov-report=term-missing -v"
    build_command: "uv run ruff check src/ tests/ && uv run mypy src/"
    coverage_threshold: 70
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner: pytest
  command: "uv run pytest tests/ --cov=src --cov-report=term-missing -v"
  layers:
    unit: "uv run pytest tests/unit/ -v"
    integration: "uv run pytest tests/integration/ -v"
  coverage:
    available: true
    command: "uv run pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing"
    threshold: 70
  quality:
    linter: "uv run ruff check src/ tests/"
    type_checker: "uv run mypy src/"
    formatter: "uv run ruff format --check src/ tests/"
